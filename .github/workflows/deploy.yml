name: Deploy to Mac Mini Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Authenticates & Downloads code to a temp folder (Updated to v4)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Sync the downloaded code to your live folder on the Mac Mini
      - name: Sync Files to Live Folder
        run: |
          # Ensure the Mac Mini developer folder exists
          mkdir -p /Users/gaurav/Developer/Source-Point
          
          # Copy files from Runner -> Live Server
          # -a: preserve permissions, -v: verbose
          # --exclude: protect local environments and configs
          rsync -av --exclude='.git' --exclude='venv' --exclude='__pycache__' ./ /Users/gaurav/Developer/Source-Point/

      # 3. Rebuild Docker (Updated to include Celery workers and scheduler)
      - name: Rebuild Application
        run: |
          cd /Users/gaurav/Developer/Source-Point
          # We rebuild web, worker, and scheduler so background tasks get the new code too
          docker compose up -d --build web worker scheduler

      # 4. Database Migrations
      - name: Run Database Migrations
        run: |
          cd /Users/gaurav/Developer/Source-Point

          # Get the current migration revision in the DB
          CURRENT=$(docker compose exec -T web flask db current 2>/dev/null | grep -oE '[a-f0-9]{12}' | head -1)
          echo "Current DB revision: $CURRENT"

          # If DB has no revision stamped, OR is at a3f7c8d91e2b (the pre-superscoins
          # baseline) — the superscoins tables already exist physically in production
          # but Alembic doesn't know about them. Stamp f4b2c8d9e101 to skip that migration.
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "a3f7c8d91e2b" ]; then
            echo "Stamping f4b2c8d9e101 (superscoins tables baseline) to skip already-applied migration..."
            docker compose exec -T web flask db stamp f4b2c8d9e101
          fi

          # Now safely apply only pending migrations
          docker compose exec -T web flask db upgrade

      # 5. Cleanup
      - name: Cleanup Old Images
        run: |
          docker image prune -f
