name: Deploy to Mac Mini Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Authenticates & Downloads code to a temp folder (Updated to v4)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Sync the downloaded code to your live folder on the Mac Mini
      - name: Sync Files to Live Folder
        run: |
          # Ensure the Mac Mini developer folder exists
          mkdir -p /Users/gaurav/Developer/Source-Point
          
          # Copy files from Runner -> Live Server
          # -a: preserve permissions, -v: verbose
          # --exclude: protect local environments and configs
          rsync -av --exclude='.git' --exclude='venv' --exclude='__pycache__' ./ /Users/gaurav/Developer/Source-Point/

      # 3. Rebuild Docker (Updated to include Celery workers and scheduler)
      - name: Rebuild Application
        run: |
          cd /Users/gaurav/Developer/Source-Point
          # We rebuild web, worker, and scheduler so background tasks get the new code too
          docker compose up -d --build web worker scheduler

      # 4. Database Migrations
      - name: Run Database Migrations
        run: |
          cd /Users/gaurav/Developer/Source-Point
          docker compose exec -T web flask db upgrade

      # 5. Cleanup
      - name: Cleanup Old Images
        run: |
          docker image prune -f
