{% extends "layout.html" %}
{% block title %}Login or Register — SourcePoint{% endblock %}

{% block content %}
<!-- ═══════════════════════════════════════════════════════════════
     FUTURISTIC LOGIN PAGE — SourcePoint
     ═══════════════════════════════════════════════════════════════ -->

<style>
  /* ── Canvas BG ── */
  #loginCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── Card ── */
  .login-card {
    background: rgba(10, 10, 20, 0.75);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(99, 102, 241, 0.25);
    box-shadow: 0 0 60px rgba(99,102,241,0.12), 0 0 120px rgba(6,182,212,0.06);
  }


  /* ── Corner accents ── */
  .corner { position: absolute; width: 18px; height: 18px; }
  .corner-tl { top: -1px; left: -1px; border-top: 2px solid #6366f1; border-left: 2px solid #6366f1; border-radius: 4px 0 0 0; }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid #06b6d4; border-right: 2px solid #06b6d4; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid #06b6d4; border-left: 2px solid #06b6d4; border-radius: 0 0 0 4px; }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid #6366f1; border-right: 2px solid #6366f1; border-radius: 0 0 4px 0; }

  /* ── Inputs ── */
  .sp-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    color: #f1f5f9;
    font-size: 0.875rem;
    outline: none;
    transition: all 0.3s ease;
  }
  .sp-input:focus {
    border-color: #6366f1;
    background: rgba(99,102,241,0.08);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 0 20px rgba(99,102,241,0.08);
  }
  .sp-input::placeholder { color: rgba(148,163,184,0.5); }

  /* ── Password field with typing animation ── */
  .pw-wrap { position: relative; }
  .pw-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    border-radius: 0 0 10px 10px;
    width: 0%;
    transition: width 0.4s ease, background 0.4s ease;
    background: linear-gradient(90deg, #6366f1, #06b6d4);
  }
  .pw-dots {
    display: flex; gap: 5px; margin-top: 6px;
  }
  .pw-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    transition: all 0.3s ease;
    transform: scale(0.8);
  }
  .pw-dot.active {
    transform: scale(1.15);
    box-shadow: 0 0 8px currentColor;
  }
  .pw-dot.s1 { background: #ef4444; border-color: #ef4444; color: #ef4444; }
  .pw-dot.s2 { background: #f97316; border-color: #f97316; color: #f97316; }
  .pw-dot.s3 { background: #eab308; border-color: #eab308; color: #eab308; }
  .pw-dot.s4 { background: #22c55e; border-color: #22c55e; color: #22c55e; }
  .pw-strength-label { font-size: 0.7rem; margin-left: auto; transition: color 0.3s; }

  /* ── Tab toggle ── */
  .tab-btn { flex: 1; padding: 10px; font-size: 0.8rem; font-weight: 600; border-radius: 8px; transition: all 0.3s; color: #94a3b8; cursor: pointer; }
  .tab-btn.active { background: linear-gradient(135deg,#4f46e5,#0891b2); color: white; box-shadow: 0 0 20px rgba(99,102,241,0.3); }

  /* ── Submit button ── */
  .sp-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #4f46e5 0%, #0891b2 100%);
    color: white;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 0 24px rgba(99,102,241,0.35);
  }
  .sp-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(99,102,241,0.55);
  }
  .sp-btn:active { transform: translateY(0); }
  .sp-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .sp-btn:hover::after { opacity: 1; }

  /* ── Scan line animation on button click ── */
  @keyframes scanLine {
    0%   { top: -100%; opacity: 0.7; }
    100% { top: 200%;  opacity: 0; }
  }
  .btn-scan {
    position: absolute; left: 0; width: 100%; height: 40%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: scanLine 0.7s ease forwards;
    pointer-events: none;
  }

  /* ── Logo pulse ── */
  @keyframes logoPulse {
    0%,100% { box-shadow: 0 0 20px rgba(99,102,241,0.4), 0 0 40px rgba(6,182,212,0.1); }
    50%      { box-shadow: 0 0 30px rgba(99,102,241,0.7), 0 0 60px rgba(6,182,212,0.2); }
  }
  .logo-orb {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #4f46e5, #0891b2);
    display: flex; align-items: center; justify-content: center;
    animation: logoPulse 3s ease-in-out infinite;
    font-size: 1.4rem;
    box-shadow: 0 0 20px rgba(99,102,241,0.4);
  }

  /* ── Floating particles ── */
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    20%  { opacity: 0.8; }
    80%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-80px) scale(1); }
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: floatUp linear infinite;
  }

  /* ── Role pill ── */
  .role-pill {
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 8px;
    padding: 8px 6px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #94a3b8;
    cursor: pointer;
    text-align: center;
    background: rgba(255,255,255,0.03);
    transition: all 0.25s ease;
  }
  .role-pill:hover, .role-pill.selected {
    background: rgba(99,102,241,0.18);
    border-color: #6366f1;
    color: #a5b4fc;
    box-shadow: 0 0 12px rgba(99,102,241,0.2);
  }

  /* ── Label ── */
  .sp-label { display: block; font-size: 0.75rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Scanline bg on whole page ── */
  .page-scanlines::after {
    content: '';
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* ── Typing cursor blink on heading ── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor-blink::after { content: '|'; animation: blink 1s step-end infinite; color: #6366f1; margin-left: 2px; }

  select.sp-input option { background: #0f0f1a; color: #f1f5f9; }
</style>

<!-- Animated canvas -->
<canvas id="loginCanvas"></canvas>

<!-- Page scanline overlay -->
<div class="page-scanlines pointer-events-none"></div>

<div class="relative z-10 min-h-screen flex items-center justify-center py-8 sm:py-10 px-4"
     x-data="loginPage()"
     x-init="initParticles()">

  <div class="login-card relative w-full max-w-md rounded-2xl p-5 sm:p-8 my-4 sm:my-6">
    <!-- Corner accents -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Floating particles inside card -->
    <div id="card-particles" class="absolute inset-0 overflow-hidden rounded-2xl pointer-events-none"></div>

    <!-- Logo & heading -->
    <div class="relative text-center mb-5 sm:mb-7">
      <div class="logo-orb mx-auto mb-3 sm:mb-4" style="width:44px;height:44px;border-radius:12px;font-size:1.1rem;">
        <span>⚡</span>
      </div>
      <h1 class="text-2xl font-black text-white tracking-tight" :class="mode === 'login' ? 'cursor-blink' : ''">
        <span x-text="mode === 'login' ? 'Welcome Back' : 'Join SourcePoint'"></span>
      </h1>
      <p class="text-xs text-slate-500 mt-1">
        <span x-show="mode === 'login'">Authenticate to access your secure dashboard</span>
        <span x-show="mode === 'register'">Create your account to get started</span>
      </p>

    </div>

    <!-- Tab switcher -->
    <div class="flex gap-1 bg-white/[0.03] border border-white/[0.06] rounded-xl p-1 mb-7">
      <button type="button" @click="mode = 'login'"
        :class="mode === 'login' ? 'active' : ''"
        class="tab-btn">
        <i class="fas fa-fingerprint mr-1.5"></i> Sign In
      </button>
      <button type="button" @click="mode = 'register'"
        :class="mode === 'register' ? 'active' : ''"
        class="tab-btn">
        <i class="fas fa-user-astronaut mr-1.5"></i> Register
      </button>
    </div>

    <!-- ══ LOGIN FORM ══ -->
    <form x-show="mode === 'login'"
          action="{{ url_for('auth.login') }}" method="POST"
          class="space-y-5"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
          @submit="handleSubmit($event, $el)">

      <div>
        <label class="sp-label"><i class="fas fa-at opacity-60 mr-1"></i>Email Address</label>
        <div class="relative">
          <input id="login-email" name="email" type="email" required placeholder="you@example.com"
                 class="sp-input"
                 @focus="activateField($el)"
                 @blur="deactivateField($el)">
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-400/50 text-sm">
            <i class="fas fa-envelope"></i>
          </span>
        </div>
      </div>

      <div>
        <label class="sp-label"><i class="fas fa-lock opacity-60 mr-1"></i>Password</label>
        <div class="pw-wrap">
          <div class="relative">
            <input id="login-password" name="password" type="password" required placeholder="••••••••"
                   class="sp-input"
                   @input="updatePwStrength($event, 'login')"
                   @focus="activateField($el); pwFocused = true"
                   @blur="deactivateField($el); pwFocused = false"
                   x-ref="loginPw">
            <button type="button"
                    @click="togglePw($refs.loginPw)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-indigo-400 transition-colors text-sm">
              <i :class="showPw ? 'fas fa-eye-slash' : 'fas fa-eye'" x-data="{showPw: false}"></i>
            </button>
            <div class="pw-bar" :style="`width:${loginPwWidth}%; background:${loginPwColor}`"></div>
          </div>

          <!-- Strength dots -->
          <div x-show="loginPwLen > 0" x-transition class="flex items-center gap-1 mt-2 px-1">
            <div class="pw-dots">
              <template x-for="i in 4">
                <div class="pw-dot"
                     :class="[loginPwStrength >= i ? 'active s'+i : '']"></div>
              </template>
            </div>
            <span class="pw-strength-label"
                  :style="`color:${loginPwColor}`"
                  x-text="['','Weak','Fair','Good','Strong'][loginPwStrength]"></span>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between text-xs">
        <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
          <input type="checkbox" name="remember-me"
                 class="w-3.5 h-3.5 rounded bg-white/5 border border-indigo-500/30 text-indigo-600 focus:ring-indigo-500">
          Remember me
        </label>
        <a href="{{ url_for('auth.reset_password_request') }}"
           class="text-indigo-400 hover:text-indigo-300 transition-colors font-semibold">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="sp-btn" id="loginBtn" @click="startScan($el)">
        <i class="fas fa-arrow-right-to-bracket mr-2"></i>
        Authenticate
      </button>
    </form>

    <!-- ══ REGISTER FORM ══ -->
    <form x-show="mode === 'register'"
          action="{{ url_for('auth.register') }}" method="POST"
          class="space-y-4" style="display:none;"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 -translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
          @submit="handleSubmit($event, $el)">

      <!-- Role selector -->
      <div>
        <label class="sp-label"><i class="fas fa-id-badge opacity-60 mr-1"></i>Join As</label>
        <div class="grid grid-cols-3 gap-2">
          <template x-for="r in roles" :key="r.val">
            <div class="role-pill" :class="role === r.val ? 'selected' : ''"
                 @click="role = r.val"
                 x-text="r.label"></div>
          </template>
        </div>
        <input type="hidden" name="role" x-model="role">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="sp-label">Username</label>
          <input name="username" type="text" required placeholder="yourname"
                 class="sp-input"
                 @focus="activateField($el)" @blur="deactivateField($el)">
        </div>
        <div>
          <label class="sp-label">Mobile</label>
          <input name="mobile_number" type="tel" required placeholder="+91..."
                 class="sp-input"
                 @focus="activateField($el)" @blur="deactivateField($el)">
        </div>
      </div>

      <div>
        <label class="sp-label">Email</label>
        <input name="email" type="email" required placeholder="you@example.com"
               class="sp-input"
               @focus="activateField($el)" @blur="deactivateField($el)">
      </div>

      <!-- Skill fields for candidate/developer -->
      <div x-show="['candidate','developer'].includes(role)" x-transition
           class="grid grid-cols-1 sm:grid-cols-2 gap-3 p-3 border border-indigo-500/20 rounded-xl bg-indigo-900/10">
        <div>
          <label class="sp-label">Primary Skill</label>
          <select name="primary_skill" class="sp-input">
            <option value="">Select…</option>
            <option value="java">Java</option>
            <option value="python">Python</option>
            <option value="sql">SQL / Database</option>
            <option value="react">React / Frontend</option>
            <option value="cpp">C++</option>
          </select>
        </div>
        <div>
          <label class="sp-label">Experience</label>
          <select name="primary_skill_experience" class="sp-input">
            <option value="0-1">Fresher (0-1 yr)</option>
            <option value="1-3">Junior (1-3 yr)</option>
            <option value="3-5">Mid-Level (3-5 yr)</option>
            <option value="5+">Senior (5+ yr)</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="sp-label">Password</label>
          <div class="pw-wrap">
            <input name="password" type="password" required placeholder="••••••••"
                   class="sp-input"
                   @input="updatePwStrength($event, 'reg')"
                   @focus="activateField($el)" @blur="deactivateField($el)"
                   x-ref="regPw">
            <div class="pw-bar" :style="`width:${regPwWidth}%; background:${regPwColor}`"></div>
          </div>
        </div>
        <div>
          <label class="sp-label">Confirm</label>
          <input name="confirm_password" type="password" required placeholder="••••••••"
                 class="sp-input"
                 @focus="activateField($el)" @blur="deactivateField($el)">
        </div>
      </div>

      <div>
        <label class="sp-label">Recovery Question</label>
        <input name="secret_question" type="text" placeholder="e.g. Your pet's name?"
               required class="sp-input"
               @focus="activateField($el)" @blur="deactivateField($el)">
      </div>
      <div>
        <label class="sp-label">Recovery Answer</label>
        <input name="secret_answer" type="text" required
               class="sp-input"
               @focus="activateField($el)" @blur="deactivateField($el)">
      </div>

      <button type="submit" class="sp-btn mt-2" @click="startScan($el)">
        <i class="fas fa-rocket mr-2"></i>
        Launch Account
      </button>
    </form>

    <!-- Bottom ID bar -->
    <div class="mt-6 flex items-center gap-2 justify-center">
      <div class="h-px flex-1 bg-gradient-to-r from-transparent to-indigo-500/20"></div>
      <span class="text-[10px] font-mono text-slate-600 tracking-widest">SOURCE·POINT // SECURE</span>
      <div class="h-px flex-1 bg-gradient-to-l from-transparent to-indigo-500/20"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CANVAS BACKGROUND — Animated grid + moving nodes + beams
   ═══════════════════════════════════════════════════════════════ */
(function () {
  // Skip canvas animation on mobile — saves CPU/battery
  const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window);
  if (isMobile) return;

  const canvas = document.getElementById('loginCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], animId;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Node {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.r  = Math.random() * 2 + 1;
      this.alpha = Math.random() * 0.5 + 0.2;
      this.hue   = Math.random() > 0.5 ? 245 : 190; // indigo or cyan
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue},80%,65%,${this.alpha})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 70; i++) nodes.push(new Node());

  const CONNECT_DIST = 130;
  function drawConnections() {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < CONNECT_DIST) {
          const a = (1 - d / CONNECT_DIST) * 0.25;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(99,102,241,${a})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }
  }

  // Scrolling beam
  let beamY = -200;
  function drawBeam() {
    beamY += 0.6;
    if (beamY > H + 200) beamY = -200;
    const grad = ctx.createLinearGradient(0, beamY - 80, 0, beamY + 80);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, 'rgba(99,102,241,0.04)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, beamY - 80, W, 160);
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    drawBeam();
    nodes.forEach(n => { n.update(); n.draw(); });
    drawConnections();
    animId = requestAnimationFrame(animate);
  }
  animate();
})();

/* ═══════════════════════════════════════════════════════════════
   ALPINE COMPONENT
   ═══════════════════════════════════════════════════════════════ */
function loginPage() {
  return {
    mode: 'login',
    role: 'candidate',
    roles: [
      {val:'candidate', label:'Candidate'},
      {val:'seller',    label:'Seller'},
      {val:'buyer',     label:'Buyer'},
      {val:'developer', label:'Developer'},
      {val:'recruiter', label:'Recruiter'},
      {val:'moderator', label:'Moderator'},
    ],
    showPw: false,
    pwFocused: false,
    // Login pw strength
    loginPwLen:      0,
    loginPwStrength: 0,
    loginPwWidth:    0,
    loginPwColor:    '#ef4444',
    // Register pw strength
    regPwWidth:      0,
    regPwColor:      '#ef4444',

    updatePwStrength(e, form) {
      const v = e.target.value;
      const len = v.length;
      let score = 0;
      if (len >= 6)  score++;
      if (len >= 10) score++;
      if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      score = Math.max(1, Math.min(4, score));
      const colors = ['','#ef4444','#f97316','#eab308','#22c55e'];
      const widths  = [0, 25, 50, 75, 100];
      if (form === 'login') {
        this.loginPwLen      = len;
        this.loginPwStrength = len > 0 ? score : 0;
        this.loginPwWidth    = len > 0 ? widths[score] : 0;
        this.loginPwColor    = colors[score];
      } else {
        this.regPwWidth  = len > 0 ? widths[score] : 0;
        this.regPwColor  = colors[score];
      }
    },

    togglePw(el) {
      this.showPw = !this.showPw;
      el.type = this.showPw ? 'text' : 'password';
    },

    activateField(el) {
      el.style.borderColor = '#6366f1';
      el.style.boxShadow = '0 0 0 3px rgba(99,102,241,0.15), 0 0 20px rgba(99,102,241,0.08)';
    },
    deactivateField(el) {
      el.style.borderColor = 'rgba(99,102,241,0.25)';
      el.style.boxShadow = '';
    },

    startScan(btn) {
      const scan = document.createElement('div');
      scan.className = 'btn-scan';
      btn.appendChild(scan);
      setTimeout(() => scan.remove(), 800);
    },

    handleSubmit(e, form) {
      // Show loading state
      const btn = form.querySelector('button[type=submit]');
      if (btn) {
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Processing…';
        btn.disabled = true;
      }
    },

    initParticles() {
      const container = document.getElementById('card-particles');
      if (!container) return;
      const colors = ['rgba(99,102,241,0.6)','rgba(6,182,212,0.5)','rgba(167,139,250,0.5)'];
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.cssText = `
          width:${size}px; height:${size}px;
          left:${Math.random()*100}%;
          bottom:${Math.random()*20}%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration:${Math.random()*4+3}s;
          animation-delay:${Math.random()*5}s;
        `;
        container.appendChild(p);
      }
    },
  };
}
</script>
{% endblock %}
